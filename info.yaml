# Tiny Tapeout project information
project:
  title:        "4-Bit Charge-Redistribution SAR ADC Controller"
  author:       "Josue Olivos"
  discord:      ""  # Add your Discord username if desired
  description:  "Digital control logic for an external 4-bit charge-redistribution SAR ADC"
  language:     "Verilog"
  clock_hz:     50000000

  # The SAR controller should fit within one Tiny Tapeout tile.
  tiles: "1x1"

  # This must exactly match the module name in src/project.v.
  top_module: "tt_um_josue_olivos_sar_adc"

  # Source files located in the src directory.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank.
pinout:
  # Dedicated inputs
  ui[0]: "Comparator output"
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Dedicated outputs
  uo[0]: "DAC bit 0 - LSB"
  uo[1]: "DAC bit 1"
  uo[2]: "DAC bit 2"
  uo[3]: "DAC bit 3 - MSB"
  uo[4]: "Sample switch control"
  uo[5]: "FSM state bit 0"
  uo[6]: "FSM state bit 1"
  uo[7]: "FSM state bit 2"

  # Bidirectional pins are unused and configured as inputs.
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
